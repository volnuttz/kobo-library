<!doctype html>
<html>
<head>
	<title>Kobo Library</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<meta name="referrer" content="no-referrer"/>
	<link rel="stylesheet" type="text/css" href="/static/style.css"/>
	<script src="/static/common.js"></script>
</head>
<body>
<main class="wrapper">
	<h1>Kobo Library</h1>
	<p id="shelfstatus" class="shelf-status">Loading shelf...</p>
	<section class="qr-panel"><img class="qr-code" src="qr/page.svg" alt="QR code for this page"/></section>
	<form action="upload" method="post" enctype="multipart/form-data" id="uploadform" class="upload-panel">
		<div class="file-row">
			<label for="fileinput" id="choosebtn">Choose EPUB</label>
			<input type="file" name="file" id="fileinput" accept=".epub,application/epub+zip,application/epub"/>
			<input type="submit" value="Upload"/>
		</div>
		<div id="fileinfo"></div><div id="uploadstatus"></div>
	</form>
	<section class="books-section"><h2>Books</h2><div id="books" class="book-list"></div></section>
	<p class="note">Anyone with this shelf URL can manage its books. Do not share it publicly.</p>
</main>
<script src="/static/app.js"></script>
</body>
</html>
